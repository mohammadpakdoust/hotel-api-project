services:
  - type: web
    name: hotel-api-project
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn hotel_api.wsgi --bind 0.0.0.0:$PORT --timeout 120 --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: hotel-db
    plan: free
